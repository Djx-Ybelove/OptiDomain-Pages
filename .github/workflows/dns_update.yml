name: OptiDomain Auto DNS Update

on:
  # 每天北京时间早 6 点 (UTC 22:00) 和 晚 6 点 (UTC 10:00) 自动触发
  schedule:
    - cron: '0 10,22 * * *'
  # 允许在 Github Action 网页端手动点击运行
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予写入仓库的权限，这是推送 CSV 所必须的
    
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 缓存 pip 以加速构建
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run DNS Update Script
        run: python update_dns_auto.py
        
      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add optimized_cf_ips.csv
          # 判断文件是否有变动，如果有变动就提交并 Push
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): auto-update optimal CF CDN ips CSV [skip ci]" && git push)
